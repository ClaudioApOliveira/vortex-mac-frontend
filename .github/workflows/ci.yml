name: CI

on:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  quality:
    name: Lint & Build
    # Runner self-hosted em ~/actions-runner-2 (label: vortex-mec-frontend)
    runs-on: [self-hosted, vortex-mec-frontend]
    # Evita executar PRs de forks no runner self-hosted (risco de execução de código não confiável).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Oxlint
        run: bun run lint

      - name: Build
        run: bun run build
        env:
          VITE_API_URL: ''

  docker:
    name: Docker Build
    runs-on: [self-hosted, vortex-mec-frontend]
    needs: quality
    environment: DOCKERHUB
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: |
          set -euo pipefail
          docker build \
            --tag "vortex-mec-frontend:${{ github.sha }}" \
            --tag "vortex-mec-frontend:latest" \
            .

      - name: Smoke test container
        run: |
          docker run -d --name vortex-mec-frontend-ci -p 8088:8080 "vortex-mec-frontend:${{ github.sha }}"
          for i in {1..10}; do
            if curl -fsS http://127.0.0.1:8088/ > /dev/null; then
              echo "Container responded successfully"
              exit 0
            fi
            sleep 1
          done
          echo "Container failed to respond"
          docker logs vortex-mec-frontend-ci
          exit 1

      - name: Run Trivy vulnerability scanner
        run: |
          set -euo pipefail
          if ! command -v trivy >/dev/null 2>&1; then
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
              | sh -s -- -b /usr/local/bin
          fi
          trivy image \
            --format table \
            --exit-code 1 \
            --ignore-unfixed \
            --vuln-type os,library \
            --severity CRITICAL,HIGH \
            "vortex-mec-frontend:${GITHUB_SHA}"

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          IMAGE: oliveiraclaudio/vortex-mec-frontend
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          docker tag "vortex-mec-frontend:${GITHUB_SHA}" "${IMAGE}:latest"
          docker tag "vortex-mec-frontend:${GITHUB_SHA}" "${IMAGE}:${SHORT_SHA}"
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${SHORT_SHA}"

      - name: Cleanup
        if: always()
        run: |
          docker rm -f vortex-mec-frontend-ci || true
          docker image prune -f || true
