# Stack Vortex MEC — Traefik + Cloudflare + Portainer
#
# Estrutura esperada no servidor:
#   Oficina/
#     vortex-mec-frontend/   (este repositório)
#     mec-backend/
#
# Portainer: Stacks → Add stack → cole este arquivo + .env (copie de ../../.env.example)

name: vortex-mec

services:
  traefik:
    image: traefik:v3.3
    container_name: vortex-traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command:
      - --log.level=INFO
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=vortex
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.cloudflare.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.cloudflare.acme.dnschallenge=true
      - --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53
    environment:
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}
      CF_API_EMAIL: ${CF_API_EMAIL:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - vortex

  postgres:
    image: postgres:16-alpine
    container_name: vortex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mec}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
    volumes:
      - mec_pg_data:/var/lib/postgresql/data
      - ../mec-backend/docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ../mec-backend/docker/postgres/seeds/municipios.sql:/docker-entrypoint-initdb.d/02-municipios.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mec}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - vortex

  valkey:
    image: valkey/valkey:8-alpine
    container_name: vortex-valkey
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - mec_valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - vortex

  backend:
    build:
      context: ../mec-backend
      dockerfile: Dockerfile
    container_name: vortex-backend
    restart: unless-stopped
    environment:
      QUARKUS_PROFILE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mec}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://valkey:6379
      CORS_ORIGINS: https://${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - vortex

  frontend:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: vortex-frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=vortex
      - traefik.http.routers.vortex-frontend.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.vortex-frontend.entrypoints=websecure
      - traefik.http.routers.vortex-frontend.tls=true
      - traefik.http.routers.vortex-frontend.tls.certresolver=cloudflare
      - traefik.http.routers.vortex-frontend.middlewares=vortex-security@docker
      - traefik.http.routers.vortex-frontend-http.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.vortex-frontend-http.entrypoints=web
      - traefik.http.routers.vortex-frontend-http.middlewares=redirect-to-https@docker
      - traefik.http.services.vortex-frontend.loadbalancer.server.port=8080
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true
      - traefik.http.middlewares.vortex-security.headers.stsSeconds=31536000
      - traefik.http.middlewares.vortex-security.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.vortex-security.headers.stsPreload=true
      - traefik.http.middlewares.vortex-security.headers.contentTypeNosniff=true
      - traefik.http.middlewares.vortex-security.headers.browserXssFilter=true
      - traefik.http.middlewares.vortex-security.headers.frameDeny=true
      - traefik.http.middlewares.vortex-security.headers.referrerPolicy=strict-origin-when-cross-origin
    networks:
      - vortex

networks:
  vortex:
    name: vortex

volumes:
  mec_pg_data:
  mec_valkey_data:
  traefik_letsencrypt:
